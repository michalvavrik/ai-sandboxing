name: Build Dev Sandbox Image

on:
  schedule:
    - cron: '0 3 * * *'
  push:
    paths:
      - 'Containerfile'
      - 'configs/**'
      - 'entrypoint.sh'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      # Scheduled builds: rotate latest-next → latest, build new latest-next
      - name: Promote latest-next to latest
        if: github.event_name == 'schedule'
        run: |
          if podman pull ghcr.io/michalvavrik/ai-sandboxing/dev-sandbox:latest-next 2>/dev/null; then
            podman tag ghcr.io/michalvavrik/ai-sandboxing/dev-sandbox:latest-next \
                       ghcr.io/michalvavrik/ai-sandboxing/dev-sandbox:latest
            podman push ghcr.io/michalvavrik/ai-sandboxing/dev-sandbox:latest
          fi

      - name: Build image
        run: podman build -t ghcr.io/michalvavrik/ai-sandboxing/dev-sandbox:latest-next .

      - name: Push latest-next
        run: podman push ghcr.io/michalvavrik/ai-sandboxing/dev-sandbox:latest-next

      # Push-triggered builds: also update latest immediately (you need the fix now)
      - name: Push latest (code change)
        if: github.event_name != 'schedule'
        run: |
          podman tag ghcr.io/michalvavrik/ai-sandboxing/dev-sandbox:latest-next \
                     ghcr.io/michalvavrik/ai-sandboxing/dev-sandbox:latest
          podman push ghcr.io/michalvavrik/ai-sandboxing/dev-sandbox:latest

      - name: Delete old workflow runs
        run: |
          gh run list --json databaseId --jq '.[].databaseId' | tail -n +6 | while read -r id; do
            gh run delete "$id" || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old image versions
        run: |
          gh api /users/michalvavrik/packages/container/ai-sandboxing%2Fdev-sandbox/versions \
            --paginate --jq '.[].id' | tail -n +3 | while read -r id; do
            gh api --method DELETE "/users/michalvavrik/packages/container/ai-sandboxing%2Fdev-sandbox/versions/$id" || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
